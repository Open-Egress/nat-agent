services:
  nat-agent:
    build:
      context: ../..
      dockerfile: deployments/docker/nat.Dockerfile
    cap_add:
      - NET_ADMIN
    networks:
      public:
      private:
        ipv4_address: 10.10.0.2
    environment:
      - INTERFACE=eth0 # This should be the public interface
      - CONTROL_URL=http://control.egress.local
      - API_KEY=test-api-key
      - HB_INTERVAL=5s
      - GIN_MODE=debug
    privileged: true # Needed for kernel tuning (sysctl)
    command: >
      sh -c "sysctl -w net.ipv4.ip_forward=1 &&
             nft flush ruleset &&
             nft add table ip nat &&
             nft add chain ip nat postrouting '{ type nat hook postrouting priority 100 ; }' &&
             nft add table ip filter &&
             nft add chain ip filter forward '{ type filter hook forward priority 0 ; policy accept ; }' &&
             nft add rule ip nat postrouting oifname eth0 masquerade &&
             /usr/local/bin/open-egress-agent"

  private-instance:
    build:
      context: ../..
      dockerfile: deployments/docker/private.Dockerfile
    networks:
      private:
        ipv4_address: 10.10.0.10
    cap_add:
      - NET_ADMIN
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - nat-agent
    command: >
      sh -c "ip route del default &&
             ip route add default via 10.10.0.2 &&
             echo 'nameserver 8.8.8.8' > /etc/resolv.conf &&
             tail -f /dev/null"

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
